<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hidrografía RD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background-color: #f0f2f5; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        .panel {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        /* Título Destacado */
        #panel-titulo {
            top: 20px;
            left: 20px;
            padding: 12px 16px;
            border-left: 5px solid #2980b9;
            pointer-events: none;
        }
        #panel-titulo h1 {
            font-size: 22px;
            color: #1a5276;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            line-height: 1.1;
        }
        #panel-titulo h2 {
            font-size: 14px;
            color: #2c3e50;
            font-weight: 500;
            margin-top: 4px;
        }

        /* Controles Desplegables */
        #panel-controles {
            top: 20px;
            right: 20px;
            width: 260px;
            max-height: 85vh;
            overflow: hidden;
        }
        #panel-controles.collapsed {
            max-height: 48px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            font-weight: 700;
            color: #2c3e50;
            font-size: 15px;
            user-select: none;
        }
        .panel-header:hover { background: rgba(0,0,0,0.02); }
        .toggle-icon { transition: transform 0.3s ease; font-size: 12px; }
        .collapsed .toggle-icon { transform: rotate(-90deg); }
        .panel-content {
            padding: 12px 16px 16px 16px;
            transition: opacity 0.3s ease, max-height 0.3s ease;
            opacity: 1;
            max-height: 1000px;
        }
        .collapsed .panel-content {
            opacity: 0;
            max-height: 0;
            padding: 0 16px;
            pointer-events: none;
        }

        /* Panel Cuenca Seleccionada (Compacto y Desplegable) */
        #panel-cuenca {
            bottom: 20px;
            left: 20px;
            width: 280px;
        }
        #panel-cuenca.collapsed {
            max-height: 48px;
        }
        #panel-cuenca .panel-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .cuenca-info-box {
            background: #e8f6f3;
            border-left: 4px solid #27ae60;
            padding: 10px 12px;
            border-radius: 6px;
        }
        .cuenca-info-box strong {
            display: block;
            color: #1a5276;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .cuenca-info-box p {
            font-size: 12px;
            color: #555;
            line-height: 1.4;
        }
        .btn-mostrar-todas {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-mostrar-todas:hover { background: #c0392b; }

        /* Enlaces Discretos */
        .enlaces-discretos {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }
        .enlace-texto {
            font-size: 12px;
            color: #555;
            text-decoration: none;
            transition: color 0.2s, padding-left 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .enlace-texto:hover {
            color: #2980b9;
            padding-left: 2px;
        }
        .enlace-texto.cursor-pointer { cursor: pointer; }

        /* Estilos de controles internos */
        .grupo-control { margin-bottom: 14px; }
        .grupo-control:last-child { margin-bottom: 0; }
        .grupo-control h4 {
            font-size: 11px;
            text-transform: uppercase;
            color: #7f8c8d;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            font-weight: 700;
        }
        .btn-opcion {
            display: flex; align-items: center; gap: 8px; padding: 8px 12px;
            border: 1px solid #e0e0e0; border-radius: 6px; background: #fff;
            color: #333; font-size: 13px; cursor: pointer; transition: all 0.2s;
            width: 100%; text-align: left;
        }
        .btn-opcion:hover { background: #f8f9fa; border-color: #2980b9; color: #2980b9; }
        .btn-opcion.active { background: #2980b9; color: white; border-color: #2980b9; }
        
        .checkbox-opcion {
            display: flex; align-items: center; gap: 8px; padding: 4px 0;
            font-size: 13px; color: #333; cursor: pointer;
        }
        .checkbox-opcion input { accent-color: #2980b9; width: 15px; height: 15px; cursor: pointer; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; display: none;
            align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white; padding: 24px; border-radius: 12px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-width: 250px;
        }
        .modal-content h3 { margin: 0 0 12px 0; color: #1a5276; font-size: 18px; }
        .modal-content p { color: #555; margin-bottom: 20px; font-size: 16px; font-weight: 600; }
        .btn-cerrar-modal {
            background: #2980b9; color: white; border: none; padding: 8px 20px;
            border-radius: 6px; cursor: pointer; font-weight: 600;
        }
        .btn-cerrar-modal:hover { background: #1f618d; }

        /* Leaflet Controls Positioning (No Overlap) */
        .leaflet-bottom.leaflet-right {
            margin-bottom: 10px;
            margin-right: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        .leaflet-control-scale {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 0 !important;
            order: 1;
        }
        .leaflet-control-attribution {
            background: rgba(255, 255, 255, 0.9) !important;
            border-radius: 4px;
            padding: 4px 8px !important;
            font-size: 10px !important;
            box-shadow: 0 1px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
            order: 2;
        }
        .leaflet-control-zoom {
            margin-bottom: 8px !important;
            order: 0;
        }

        /* Responsive Design: Laptops and Mobile */
        @media (max-width: 768px) {
            #panel-titulo { 
                top: 10px; left: 10px; right: 10px; width: auto; 
                text-align: center; border-left: none; border-bottom: 3px solid #2980b9;
            }
            #panel-controles { 
                top: 70px; right: 10px; width: 240px; 
            }
            #panel-cuenca { 
                bottom: 100px; 
                left: 10px; right: 10px; width: auto; 
                max-height: 40vh;
            }
            #panel-cuenca.collapsed {
                max-height: 48px;
            }
            .enlaces-discretos {
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            #panel-controles { width: calc(100vw - 20px); right: 10px; }
            #panel-cuenca { bottom: 110px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Título Destacado -->
    <div id="panel-titulo" class="panel">
        <h1>HIDROGRAFÍA RD</h1>
        <h2>Aguas Superficiales</h2>
    </div>

    <!-- Controles Desplegables -->
    <div id="panel-controles" class="panel">
        <div class="panel-header" onclick="togglePanel('panel-controles')">
            <span>⚙️ Controles</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div class="panel-content">
            <div class="grupo-control">
                <h4>Vista de fondo</h4>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <button class="btn-opcion active" onclick="cambiarBase('mapa', this)">🗺️ Vista Dibujo</button>
                    <button class="btn-opcion" onclick="cambiarBase('satelite', this)">🛰️ Vista Satélite</button>
                </div>
            </div>

            <div class="grupo-control">
                <h4>Capa hidrográfica</h4>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <button id="btn-capa-cauce" class="btn-opcion" onclick="cambiarCapas('cauce', this)">〰️ Cauce</button>
                    <button id="btn-capa-cuenca" class="btn-opcion" onclick="cambiarCapas('cuenca', this)">🟩 Cuenca</button>
                    <button id="btn-capa-ambos" class="btn-opcion active" onclick="cambiarCapas('ambos', this)">🗂️ Ambos</button>
                </div>
            </div>

            <div class="grupo-control">
                <h4>Capas adicionales</h4>
                <label class="checkbox-opcion">
                    <input type="checkbox" id="chk-presas" onchange="toggleCapaAdicional('presas')"> 🟠 Presas
                </label>
                <label class="checkbox-opcion">
                    <input type="checkbox" id="chk-lagos" onchange="toggleCapaAdicional('lagos')"> 🔵 Lagos / Lagunas
                </label>
            </div>
        </div>
    </div>

    <!-- Panel Cuenca Seleccionada (Compacto y Desplegable) -->
    <div id="panel-cuenca" class="panel">
        <div class="panel-header" onclick="togglePanel('panel-cuenca')">
            <span>✨ Cuenca seleccionada</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div class="panel-content">
            <div class="cuenca-info-box">
                <strong id="nombreCuenca">— ninguna —</strong>
                <p id="descCuenca">Haz clic en una cuenca o cauce en el mapa para ver sus detalles.</p>
                <button id="btn-mostrar-todas" class="btn-mostrar-todas" onclick="mostrarTodas()">
                    ✕ Mostrar todas
                </button>
            </div>
            
            <div class="enlaces-discretos">
                <a href="https://edupunto.com/" target="_blank" class="enlace-texto">🌐 EDUPUNTO</a>
                <a href="https://drive.google.com/file/d/1kCcGXRuTVtTigYxtQMEITKMT42g8akv5/view?usp=sharing" target="_blank" class="enlace-texto">🖨️ IMPRIMIBLE</a>
                <span class="enlace-texto cursor-pointer" onclick="abrirModalCreditos()">© CRÉDITOS</span>
                <a href="https://drive.google.com/file/d/16UP5fYCeAg1RaSXWI9cTsO7FVq6YM0Hf/view?usp=sharing" target="_blank" class="enlace-texto">💡 CONCEPTO</a>
            </div>
        </div>
    </div>

    <!-- Modal de Créditos -->
    <div id="modal-creditos" class="modal-overlay" onclick="cerrarModalCreditos(event)">
        <div class="modal-content">
            <h3>Créditos</h3>
            <p>Ernesto, 2026</p>
            <button class="btn-cerrar-modal" onclick="cerrarModalCreditos()">Cerrar</button>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        // 1. INICIALIZAR EL MAPA
        // ═══════════════════════════════════════════════════════════
        var map = L.map('map', { 
            zoomControl: false,
            attributionControl: false 
        }).setView([19.03556466237287, -70.89432006796727], 8);

        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.control.scale({ position: 'bottomright', metric: true, imperial: false }).addTo(map);
        L.control.attribution({ position: 'bottomright' }).addTo(map);

        // ═══════════════════════════════════════════════════════════
        // 2. CAPAS BASE
        // ═══════════════════════════════════════════════════════════
        var capaDibujo = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        });
        var capaSatelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles © Esri'
        });
        capaDibujo.addTo(map);

        window.cambiarBase = function(tipo, btn) {
            document.querySelectorAll('#panel-controles .grupo-control:first-child .btn-opcion').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            
            if (tipo === 'satelite') {
                map.removeLayer(capaDibujo);
                capaSatelite.addTo(map);
            } else {
                map.removeLayer(capaSatelite);
                capaDibujo.addTo(map);
            }
        };

        // ═══════════════════════════════════════════════════════════
        // 3. ESTADO GLOBAL
        // ═══════════════════════════════════════════════════════════
        var todasLasCuencas = [];
        var cuencaActiva = null;
        var capaVisible = 'ambos';
        var capasAdicionales = { presas: null, lagos: null };

        // ═══════════════════════════════════════════════════════════
        // 4. ESTILOS E ICONOS
        // ═══════════════════════════════════════════════════════════
        var estiloCuencaNormal = { color: "#27ae60", weight: 1.5, fillColor: "#2ecc71", fillOpacity: 0.18, opacity: 0.8 };
        var estiloCuencaDestacada = { color: "#f39c12", weight: 2.5, fillColor: "#f1c40f", fillOpacity: 0.35, opacity: 1 };
        var estiloCuencaOculta = { color: "#27ae60", weight: 1, fillColor: "#2ecc71", fillOpacity: 0.04, opacity: 0.15 };
        var estiloCuencaHover = { color: "#f1c40f", weight: 2.5, fillColor: "#f39c12", fillOpacity: 0.4, opacity: 1 };
        
        var estiloCauceNormal = { color: "#2980b9", weight: 3, opacity: 0.85, lineCap: 'round' };
        var estiloCauceDestacado = { color: "#3498db", weight: 4.5, opacity: 1, lineCap: 'round' };
        var estiloCauceOculto = { color: "#2980b9", weight: 1.5, opacity: 0.12, lineCap: 'round' };
        var estiloCauceHover = { color: "#2980b9", weight: 5, opacity: 1, lineCap: 'round' };

        var iconPresa = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#e74c3c; width:24px; height:24px; border-radius:50%; border:2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; font-size:12px;'>🛑</div>",
            iconSize: [24, 24], iconAnchor: [12, 12]
        });
        var iconLago = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#3498db; width:24px; height:24px; border-radius:50%; border:2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; font-size:12px;'>💧</div>",
            iconSize: [24, 24], iconAnchor: [12, 12]
        });

        // ═══════════════════════════════════════════════════════════
        // 5. FUNCIÓN PARA CONSTRUIR POPUP
        // ═══════════════════════════════════════════════════════════
        function construirPopup(properties, nombreCapa, tipo) {
            var html = '<div style="font-family:\'Segoe UI\',sans-serif; min-width:200px;">';
            
            if (tipo === 'cauce') {
                html += '<div style="font-weight:700; font-size:14px; color:#1a5276; margin-bottom:6px; border-bottom:2px solid #2980b9; padding-bottom:4px;">〰️ Cauce: ' + nombreCapa + '</div>';
                var desc = properties ? (properties['descripcion'] || properties['Description'] || properties['DESCRIPCION']) : null;
                if (desc && String(desc).trim() !== '') {
                    html += '<div style="font-size:13px; color:#333; line-height:1.4;">' + desc + '</div>';
                } else {
                    html += '<div style="font-size:12px; color:#888; font-style:italic;">Sin descripción disponible.</div>';
                }
            } else if (tipo === 'cuenca') {
                html += '<div style="font-weight:700; font-size:14px; color:#1a5276; margin-bottom:6px; border-bottom:2px solid #27ae60; padding-bottom:4px;">🟩 Cuenca: ' + nombreCapa + '</div>';
                var desc = null;
                if (properties) {
                    desc = properties['descripcion'] || properties['Description'] || properties['DESCRIPCION'];
                    if (!desc) {
                        Object.keys(properties).forEach(function(key) {
                            if (key.toLowerCase() === 'name' && String(properties[key]).trim() !== '' && String(properties[key]).trim().toLowerCase() !== nombreCapa.toLowerCase()) {
                                desc = properties[key];
                            }
                        });
                    }
                }
                if (desc && String(desc).trim() !== '' && String(desc).trim().toLowerCase() !== nombreCapa.toLowerCase()) {
                    html += '<div style="font-size:13px; color:#333; line-height:1.4;">' + desc + '</div>';
                } else {
                    html += '<div style="font-size:12px; color:#888; font-style:italic;">Sin descripción adicional.</div>';
                }
            } else {
                var nombre = properties ? (properties['nombre'] || properties['Name'] || properties['NAME'] || 'Elemento') : 'Elemento';
                var descExt = properties ? (properties['descripcion'] || properties['Description'] || '') : '';
                var icono = tipo === 'presa' ? '🟠' : '🔵';
                html += '<div style="font-weight:700; font-size:14px; color:#1a5276; margin-bottom:6px;">' + icono + ' ' + nombre + '</div>';
                if (descExt) {
                    html += '<div style="font-size:13px; color:#333; line-height:1.4;">' + descExt + '</div>';
                }
            }
            html += '</div>';
            return html;
        }

        // ═══════════════════════════════════════════════════════════
        // 6. CAMBIAR VISIBILIDAD DE CAPAS
        // ═══════════════════════════════════════════════════════════
        window.cambiarCapas = function(modo, btn) {
            capaVisible = modo;
            document.querySelectorAll('#panel-controles .grupo-control:nth-child(2) .btn-opcion').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            todasLasCuencas.forEach(function(c) {
                var estaActiva = (c === cuencaActiva);
                var mostrarCuenca = (modo === 'cuenca' || modo === 'ambos');
                var mostrarCauce  = (modo === 'cauce'  || modo === 'ambos');

                if (mostrarCuenca) {
                    if (!map.hasLayer(c.layerCuenca)) c.layerCuenca.addTo(map);
                    c.layerCuenca.setStyle(estaActiva ? estiloCuencaDestacada : (cuencaActiva ? estiloCuencaOculta : estiloCuencaNormal));
                } else {
                    if (map.hasLayer(c.layerCuenca)) map.removeLayer(c.layerCuenca);
                }

                if (mostrarCauce) {
                    if (!map.hasLayer(c.layerCauce)) c.layerCauce.addTo(map);
                    c.layerCauce.setStyle(estaActiva ? estiloCauceDestacado : (cuencaActiva ? estiloCauceOculto : estiloCauceNormal));
                } else {
                    if (map.hasLayer(c.layerCauce)) map.removeLayer(c.layerCauce);
                }
            });
        };

        window.toggleCapaAdicional = function(tipo) {
            var chk = document.getElementById('chk-' + tipo);
            if (chk.checked) {
                if (capasAdicionales[tipo]) map.addLayer(capasAdicionales[tipo]);
            } else {
                if (capasAdicionales[tipo]) map.removeLayer(capasAdicionales[tipo]);
            }
        };

        // ═══════════════════════════════════════════════════════════
        // 7. SELECCIÓN DE CUENCA
        // ═══════════════════════════════════════════════════════════
        function seleccionarCuenca(entrada) {
            cuencaActiva = entrada;
            document.getElementById('nombreCuenca').textContent = entrada.nombre;
            document.getElementById('descCuenca').textContent = 'Haz zoom o clic en el mapa para ver más detalles de esta cuenca.';
            document.getElementById('btn-mostrar-todas').style.display = 'flex';
            document.getElementById('panel-cuenca').classList.remove('collapsed');

            todasLasCuencas.forEach(function(c) {
                var mostrarCuenca = (capaVisible === 'cuenca' || capaVisible === 'ambos');
                var mostrarCauce  = (capaVisible === 'cauce'  || capaVisible === 'ambos');

                if (c === entrada) {
                    if (mostrarCuenca) { c.layerCuenca.addTo(map); c.layerCuenca.setStyle(estiloCuencaDestacada); c.layerCuenca.bringToFront(); }
                    if (mostrarCauce)  { c.layerCauce.addTo(map); c.layerCauce.setStyle(estiloCauceDestacado); c.layerCauce.bringToFront(); }
                } else {
                    if (mostrarCuenca) c.layerCuenca.setStyle(estiloCuencaOculta);
                    if (mostrarCauce)  c.layerCauce.setStyle(estiloCauceOculto);
                }
            });

            if (entrada.bounds && entrada.bounds.isValid()) {
                map.fitBounds(entrada.bounds, { padding: [50, 50] });
            }
        }

        window.mostrarTodas = function() {
            cuencaActiva = null;
            document.getElementById('nombreCuenca').textContent = '— ninguna —';
            document.getElementById('descCuenca').textContent = 'Haz clic en una cuenca o cauce en el mapa para ver sus detalles.';
            document.getElementById('btn-mostrar-todas').style.display = 'none';

            todasLasCuencas.forEach(function(c) {
                var mostrarCuenca = (capaVisible === 'cuenca' || capaVisible === 'ambos');
                var mostrarCauce  = (capaVisible === 'cauce'  || capaVisible === 'ambos');

                if (mostrarCuenca) { c.layerCuenca.addTo(map); c.layerCuenca.setStyle(estiloCuencaNormal); }
                else { if (map.hasLayer(c.layerCuenca)) map.removeLayer(c.layerCuenca); }
                
                if (mostrarCauce) { c.layerCauce.addTo(map); c.layerCauce.setStyle(estiloCauceNormal); }
                else { if (map.hasLayer(c.layerCauce)) map.removeLayer(c.layerCauce); }
            });
            map.setView([19.03556466237287, -70.89432006796727], 8);
        };

        // ═══════════════════════════════════════════════════════════
        // 8. CARGA DE JSON DESDE CARPETA /ANX (con soporte para .geojson y coordenadas flexibles)

        // Función auxiliar para convertir coordenadas de forma robusta (acepta [lng,lat] o [lat,lng])
        function coordToLatLng(coords) {
            // Si el primer valor está entre -90 y 90 y el segundo fuera de ese rango, probablemente es [lat, lng]
            if (Math.abs(coords[0]) <= 90 && (coords[1] < -180 || coords[1] > 180 || Math.abs(coords[1]) > 90)) {
                return new L.LatLng(coords[0], coords[1]);
            }
            // Caso estándar [lng, lat]
            return new L.LatLng(coords[1], coords[0]);
        }

        function cargarParCuenca(urlCuenca, urlCauce, nombreCapa) {
            var entrada = { nombre: nombreCapa, layerCuenca: null, layerCauce: null, bounds: null };
            var cargados = 0;

            function checkAndAdd() {
                if (cargados === 2) {
                    todasLasCuencas.push(entrada);
                    if (capaVisible === 'cuenca' || capaVisible === 'ambos') entrada.layerCuenca.addTo(map);
                    if (capaVisible === 'cauce' || capaVisible === 'ambos') entrada.layerCauce.addTo(map);
                }
            }

            // Cargar cuenca
            fetch(urlCuenca)
                .then(function(r) { if (!r.ok) throw new Error('Error ' + urlCuenca); return r.json(); })
                .then(function(data) {
                    entrada.layerCuenca = L.geoJSON(data, {
                        coordsToLatLng: coordToLatLng,
                        style: estiloCuencaNormal,
                        onEachFeature: function(feature, layer) {
                            layer.bindPopup(construirPopup(feature.properties, nombreCapa, 'cuenca'));
                            layer.on('click', function() { seleccionarCuenca(entrada); });
                            // Hover solo si no hay cuenca activa
                            layer.on('mouseover', function() { 
                                if (cuencaActiva === null) { 
                                    this.setStyle(estiloCuencaHover); 
                                    this.bringToFront(); 
                                } 
                            });
                            layer.on('mouseout', function() { 
                                if (cuencaActiva === null) { 
                                    this.setStyle(estiloCuencaNormal); 
                                } 
                            });
                        }
                    });
                    entrada.bounds = entrada.layerCuenca.getBounds();
                    cargados++; checkAndAdd();
                })
                .catch(function(e) { console.warn('Cuenca no cargada:', nombreCapa, e); });

            // Cargar cauce
            fetch(urlCauce)
                .then(function(r) { if (!r.ok) throw new Error('Error ' + urlCauce); return r.json(); })
                .then(function(data) {
                    entrada.layerCauce = L.geoJSON(data, {
                        coordsToLatLng: coordToLatLng,
                        style: estiloCauceNormal,
                        onEachFeature: function(feature, layer) {
                            layer.bindPopup(construirPopup(feature.properties, nombreCapa, 'cauce'));
                            layer.on('click', function() { seleccionarCuenca(entrada); });
                            // Hover solo si no hay cuenca activa
                            layer.on('mouseover', function() { 
                                if (cuencaActiva === null) { 
                                    this.setStyle(estiloCauceHover); 
                                    this.bringToFront(); 
                                } 
                            });
                            layer.on('mouseout', function() { 
                                if (cuencaActiva === null) { 
                                    this.setStyle(estiloCauceNormal); 
                                } 
                            });
                        }
                    });
                    cargados++; checkAndAdd();
                })
                .catch(function(e) { console.warn('Cauce no cargado:', nombreCapa, e); });
        }

        function cargarCapaAdicional(urlBase, tipo) {
            // Intenta primero con .json, si falla prueba con .geojson
            function intentarCarga(url) {
                fetch(url)
                    .then(function(r) { if (!r.ok) throw new Error('No se pudo cargar ' + url); return r.json(); })
                    .then(function(data) {
                        var icono = tipo === 'presas' ? iconPresa : iconLago;
                        var tipoPopup = tipo === 'presas' ? 'presa' : 'lago';
                        capasAdicionales[tipo] = L.geoJSON(data, {
                            coordsToLatLng: coordToLatLng,
                            pointToLayer: function(feature, latlng) {
                                return L.marker(latlng, { icon: icono });
                            },
                            onEachFeature: function(feature, layer) {
                                layer.bindPopup(construirPopup(feature.properties, null, tipoPopup));
                            }
                        });
                        if (document.getElementById('chk-' + tipo).checked) {
                            capasAdicionales[tipo].addTo(map);
                        }
                        console.log('Capa adicional cargada:', tipo, url);
                    })
                    .catch(function(e) {
                        console.warn('No se pudo cargar', url, e);
                        // Si falló .json, intentar con .geojson
                        if (url.endsWith('.json')) {
                            intentarCarga(url.replace('.json', '.geojson'));
                        }
                    });
            }
            intentarCarga(urlBase);
        }
